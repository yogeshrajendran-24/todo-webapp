apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-webapp-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - todo-webapp.online
    - www.todo-webapp.online
    secretName: todo-webapp-tls
  rules:
  - host: todo-webapp.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: todo-webapp-service
            port:
              number: 80
  - host: www.todo-webapp.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: todo-webapp-service
            port:
              number: 80